<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днём Рождения, Екатерина Дмитриевна!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Confetti -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- Sparkles -->
    <div id="sparklesContainer"></div>

    <!-- Balloons -->
    <div id="balloonsContainer"></div>

    <!-- HEADER -->
    <header class="header">
        <div class="header__emoji-top">🎉</div>
        <p class="header__subtitle">✦ Поздравляем тебя ✦</p>
        <h1 class="header__title">
            С Днём Рождения,
            <span class="header__name">Екатерина Дмитриевна!</span>
        </h1>
        <div class="header__cake">🎂🎁🥂</div>
    </header>

    <!-- DIVIDER -->
    <div class="divider">
        <span class="divider__line"></span>
        <span class="divider__icon">💜</span>
        <span class="divider__line"></span>
    </div>

    <!-- SECTION TITLE -->
    <div class="section-title">
        <h2>💌 Поздравления от близких</h2>
        <p>Каждый из нас вложил в эти слова частичку души</p>
    </div>

    <!-- Контейнер для карточек (изначально пустой) -->
    <div class="cards-container" id="cardsContainer"></div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer__hearts">💜 💛 💜 💛 💜</div>
        <p class="footer__text">С любовью и наилучшими пожеланиями 🎂</p>
    </div>

    <script>
        // === CONFETTI ===
        const confettiContainer = document.getElementById('confettiContainer');
        const confettiColors = ['#ff6b9d', '#ffd700', '#a29bfe', '#55efc4', '#fd79a8', '#74b9ff', '#ffeaa7', '#ff7675', '#6c5ce7', '#00cec9'];
        const confettiShapes = ['■', '●', '▲', '★', '♦'];

        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.textContent = confettiShapes[Math.floor(Math.random() * confettiShapes.length)];
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            confetti.style.fontSize = (Math.random() * 14 + 8) + 'px';
            confetti.style.animationDuration = (Math.random() * 5 + 5) + 's';
            confetti.style.animationDelay = (Math.random() * 10) + 's';
            confettiContainer.appendChild(confetti);
        }

        // === SPARKLES ===
        const sparklesContainer = document.getElementById('sparklesContainer');
        for (let i = 0; i < 30; i++) {
            const sparkle = document.createElement('div');
            sparkle.classList.add('sparkle');
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.animationDelay = (Math.random() * 3) + 's';
            sparkle.style.animationDuration = (Math.random() * 2 + 2) + 's';
            sparklesContainer.appendChild(sparkle);
        }

        // === BALLOONS ===
        const balloonsContainer = document.getElementById('balloonsContainer');
        const balloonEmojis = ['🎈', '🎈', '🎈', '🩷', '💜', '💛'];

        for (let i = 0; i < 8; i++) {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
            balloon.style.left = Math.random() * 100 + '%';
            balloon.style.animationDuration = (Math.random() * 10 + 15) + 's';
            balloon.style.animationDelay = (Math.random() * 20) + 's';
            balloon.style.fontSize = (Math.random() * 20 + 30) + 'px';
            balloonsContainer.appendChild(balloon);
        }
    </script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    <div class="modal" id="photoModal">
        <span class="modal__close">&times;</span>
        <div class="modal__content">
            <img src="" alt="Фото Владика" class="modal__image" id="modalImage">
        </div>
    </div>
</body>
</html>
